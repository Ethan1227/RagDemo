# Docker 容器化部署配置模板（容器内通过 compose 服务名互联）
# 使用方法：复制为 config.docker.yaml 并填入 api_key
#   cp backend/config/config.docker.example.yaml backend/config/config.docker.yaml

app:
  secret_key: "change-me-to-a-long-random-secret-key"
  jwt_expire_minutes: 1440
  # 前端经 nginx 同源代理 /api，通常无需跨域；保留本地调试来源
  cors_origins:
    - "http://localhost:8080"
    - "http://localhost:5173"

# 服务名与 docker-compose.yml 对应，端口为容器内部端口
mysql:
  host: "mysql"
  port: 3306
  user: "legal_user"
  password: "legal_pass"
  db: "legal_rag"

milvus:
  host: "milvus"
  port: 19530

minio:
  endpoint: "app-minio:9000"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket: "legal-rag"
  secure: false

dashscope:
  api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"   # 请填入你的 DashScope API Key
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  llm_model: "qwen-max"
  embedding_model: "text-embedding-v3"
  rerank_model: "gte-rerank-v2"

chat:
  history_rounds: 5
  temperature: 0.7
  top_p: 0.8
  max_tokens: 2048

rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5

ocr:
  lang: "ch"
  use_gpu: false
