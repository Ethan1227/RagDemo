# 民事纠纷诉状生成与咨询 RAG 系统 —— 配置模板
# 使用方法：复制本文件为 config.yaml，并填入真实密钥（config.yaml 已在 .gitignore 中，不会提交）
#   cp backend/config/config.example.yaml backend/config/config.yaml

app:
  # JWT 签名密钥，生产环境务必替换为随机长字符串
  secret_key: "change-me-to-a-long-random-secret-key"
  # JWT 过期时间（分钟）
  jwt_expire_minutes: 1440
  # 允许跨域的前端来源
  cors_origins:
    - "http://localhost:5173"
    - "http://127.0.0.1:5173"

# MySQL（对应 docker-compose 中 legal-rag-mysql，宿主机端口 3307）
mysql:
  host: "127.0.0.1"
  port: 3307
  user: "legal_user"
  password: "legal_pass"
  db: "legal_rag"

# Milvus 向量库（对应 docker-compose 中 milvus-standalone）
milvus:
  host: "127.0.0.1"
  port: 19530

# 应用层对象存储（对应 docker-compose 中 legal-rag-minio）
minio:
  endpoint: "127.0.0.1:9200"
  access_key: "minioadmin"
  secret_key: "minioadmin"
  bucket: "legal-rag"
  secure: false

# 通义千问 DashScope（LLM / Embedding / Rerank 均走此 API）
dashscope:
  api_key: "sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"   # 请填入你的 DashScope API Key
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  llm_model: "qwen-max"
  embedding_model: "text-embedding-v3"
  rerank_model: "gte-rerank"

# 对话默认推理参数（可在前端对话页覆盖）
chat:
  history_rounds: 5
  temperature: 0.7
  top_p: 0.8
  max_tokens: 2048

# 检索与切块默认参数
rag:
  chunk_size: 512
  chunk_overlap: 50
  top_k: 5

# OCR（PaddleOCR）
ocr:
  lang: "ch"
  use_gpu: false
